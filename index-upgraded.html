<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <style>
        :root {
            --background-light: #ffffff;
            --background-dark: #121212;
            --text-light: #000000;
            --text-dark: #ffffff;
            --primary-color: #6200ea;
            --secondary-color: #03dac6;
        }
        body {
            background-color: var(--background-light);
            color: var(--text-light);
            font-family: Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        body.dark {
            background-color: var(--background-dark);
            color: var(--text-dark);
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--secondary-color);
        }
        .quiz-container {
            margin: auto;
            max-width: 600px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        @media (max-width: 600px) {
            .quiz-container {
                padding: 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>Quiz Application</h1>
        <button id="toggle-theme">Toggle Dark Mode</button>
        <div id="registration">
            <h2>Register</h2>
            <input type="email" id="email" placeholder="Enter your email" required />
            <button id="register-btn">Register</button>
        </div>
        <div id="quiz">
            <h2>Select Subject</h2>
            <select id="subject-select">
                <option value="economics">Kinh tế Chính trị</option>
                <option value="math">Toán</option>
                <option value="english">Tiếng Anh</option>
                <option value="history">Lịch sử</option>
            </select>
            <h2>Quiz Questions</h2>
            <div id="questions-container"></div>
            <button id="finish-quiz">Finish Quiz</button>
        </div>
    </div>
    <script>
        // Toggle dark mode
        const toggleThemeButton = document.getElementById('toggle-theme');
        toggleThemeButton.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });

        // Register user
        const registerButton = document.getElementById('register-btn');
        registerButton.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            if (email) {
                localStorage.setItem('userEmail', email);
                alert('Registered successfully!');
            } else {
                alert('Please enter a valid email.');
            }
        });

        // Load quiz data
        const quizzes = {
            economics: [
                { question: 'Question 1?', options: ['a', 'b', 'c'], answer: 'a', difficulty: 'Dễ', favorite: false },
                { question: 'Question 2?', options: ['a', 'b', 'c'], answer: 'b', difficulty: 'Khó', favorite: false }
            ],
            math: [
                { question: 'Question 1?', options: ['a', 'b', 'c'], answer: 'c', difficulty: 'Trung bình', favorite: false }
            ],
            english: [],
            history: []
        };

        // Display questions
        const subjectSelect = document.getElementById('subject-select');
        const questionsContainer = document.getElementById('questions-container');
        subjectSelect.addEventListener('change', () => {
            const selectedSubject = subjectSelect.value;
            questionsContainer.innerHTML = '';
            quizzes[selectedSubject].forEach((q, index) => {
                const questionElement = document.createElement('div');
                questionElement.innerHTML = `<p>${q.question}</p>`;
                questionsContainer.appendChild(questionElement);
            });
        });

        // Finish quiz
        const finishQuizButton = document.getElementById('finish-quiz');
        finishQuizButton.addEventListener('click', () => {
            alert('Quiz Finished!');
        });
    </script>
</body>
</html>
