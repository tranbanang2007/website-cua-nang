<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Upgraded Version</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Quiz App</h1>
        <button id="theme-toggle">Toggle Dark Mode</button>
    </header>
    <main>
        <section id="quiz-container">
            <div id="question"></div>
            <div id="answers"></div>
            <button id="next-button">Next Question</button>
        </section>
        <section id="stats" style="display: none;">
            <h2>Your Statistics</h2>
            <p>Score: <span id="score">0</span></p>
            <p>Favorites: <span id="favorites"></span></p>
        </section>
        <section id="registration">
            <h2>Create Account</h2>
            <form id="register-form">
                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Password" required />
                <button type="submit">Register</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Quiz App. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        // Advanced features and performance improvements code will go here
        // Include email registration, localStorage fallback, and more
    </script>
</body>
</html>
